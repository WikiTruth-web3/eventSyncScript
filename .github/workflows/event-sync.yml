name: Event Sync

on:
  repository_dispatch:
    types: [sync-event]
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *' # UTC time, every 5 minutes
  push:
    branches:
      - main
    paths:
      - '**'
      - '.github/workflows/event-sync.yml'

jobs:
  sync-events:
    name: Sync Blockchain Events
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run event sync script
        env:
          # Supabase configuration (read from GitHub Secrets)
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          
          # Event sync configuration
          EVENT_SYNC_USE_PROXY: 'false'
          EVENT_SYNC_SAVE_JSON: 'false'
          
          # Dynamically set network based on triggered chainId (default to testnet)
          EVENT_SYNC_NETWORK: ${{ (github.event.client_payload.chainId == '23294') && 'mainnet' || 'testnet' }}
          
          # Optional: Custom sync configuration
          EVENT_SYNC_FROM_BLOCK: ${{ secrets.EVENT_SYNC_FROM_BLOCK }}
          EVENT_SYNC_LIMIT: ${{ secrets.EVENT_SYNC_LIMIT }}
          EVENT_SYNC_BATCH_SIZE: ${{ secrets.EVENT_SYNC_BATCH_SIZE }}
        run: npm start
        continue-on-error: false

      - name: Notify Worker of Success
        if: ${{ success() && github.event.client_payload.chainId != '' }}
        run: |
          curl -X POST "${{ secrets.SYNC_WORKER_URL }}/sync-callback" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SYNC_CLIENT_SECRET }}" \
            -d '{"chainId": "${{ github.event.client_payload.chainId }}", "status": "success"}'

      - name: Notify Worker of Failure
        if: ${{ failure() && github.event.client_payload.chainId != '' }}
        run: |
          curl -X POST "${{ secrets.SYNC_WORKER_URL }}/sync-callback" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.SYNC_CLIENT_SECRET }}" \
            -d '{"chainId": "${{ github.event.client_payload.chainId }}", "status": "failed"}'

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sync-logs
          path: '*.log'
          if-no-files-found: ignore
